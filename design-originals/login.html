<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Enterprise IDP - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;family=JetBrains+Mono:wght@400&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                            "tertiary-fixed-dim": "#bdc7d6",

                            "error": "#ba1a1a",
                            "primary-fixed": "#d6e3ff",
                            "tertiary": "#030b15",
                            "on-background": "#0b1c30",
                            "tertiary-fixed": "#d9e3f2",
                            "outline-variant": "#c4c6cf",
                            "surface-container": "#e5eeff",
                            "primary-container": "#002147",
                            "surface-bright": "#f8f9ff",
                            "primary": "#000a1e",
                            "on-secondary-fixed": "#001b3c",
                            "secondary-fixed": "#d5e3ff",
                            "inverse-primary": "#aec7f6",
                            "on-tertiary-container": "#7f8997",
                            "tertiary-container": "#18222d",
                            "inverse-on-surface": "#eaf1ff",
                            "surface-dim": "#cbdbf5",
                            "on-error-container": "#93000a",
                            "on-primary": "#ffffff",
                            "on-surface": "#0b1c30",
                            "surface-tint": "#465f88",
                            "surface-container-high": "#dce9ff",
                            "on-secondary-container": "#154985",
                            "surface-container-highest": "#d3e4fe",
                            "on-primary-container": "#708ab5",
                            "outline": "#74777f",
                            "on-primary-fixed": "#001b3d",
                            "inverse-surface": "#213145",
                            "secondary-fixed-dim": "#a7c8ff",
                            "secondary-container": "#90bafd",
                            "on-tertiary-fixed": "#131c27",
                            "surface": "#f8f9ff",
                            "surface-container-low": "#eff4ff",
                            "background": "#f8f9ff",
                            "surface-variant": "#d3e4fe",
                            "on-secondary": "#ffffff",
                            "on-surface-variant": "#44474e",
                            "on-secondary-fixed-variant": "#114783",
                            "on-tertiary-fixed-variant": "#3e4853"
                    },
                    "borderRadius": {
                            "DEFAULT": "0.125rem",
                            "lg": "0.25rem",
                            "xl": "0.5rem",
                            "full": "0.75rem"
                    },
                    "spacing": {
                            "stack-lg": "24px",
                            "stack-md": "16px",
                            "container-max": "1440px",
                            "margin-mobile": "16px",
                            "gutter": "24px",
                            "unit": "4px",
                            "margin-desktop": "32px",
                            "stack-sm": "8px"
                    },
                    "fontFamily": {
                            "body-lg": ["Inter"],
                            "label-md": ["Inter"],

                    "fontSize": {

                            "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "600"}],

        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-surface text-on-surface antialiased min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop font-body-md">
<div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
<div class="absolute top-0 left-0 w-full h-1/2 bg-gradient-to-b from-surface-container-low to-transparent"></div>
</div>
<main class="relative z-10 w-full max-w-md bg-surface-container-lowest border border-outline-variant shadow-level-3 rounded-lg overflow-hidden flex flex-col">
<header class="bg-surface-bright px-stack-lg py-stack-md border-b border-outline-variant flex flex-col items-center">
<div class="w-12 h-12 bg-primary-container text-on-primary rounded-full flex items-center justify-center mb-stack-sm shadow-level-2">
<span class="material-symbols-outlined text-[24px]" style="font-variation-settings: &quot;FILL&quot; 1;">shield_lock</span>
</div>
<h1 class="font-headline-md text-headline-md text-primary">Bank ABC Onboarding Platform</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-unit">Secure Enterprise Verification</p>
</header>
<div class="p-stack-lg flex-grow">
<form action="#" class="flex flex-col gap-stack-md" method="POST">
<div class="flex flex-col gap-stack-sm">
<label class="font-label-md text-label-md text-on-surface" for="email">Email Address</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 text-on-surface-variant">
<span class="material-symbols-outlined text-[18px]">mail</span>
</span>
<input class="w-full pl-10 pr-3 py-2 bg-surface-container-lowest border border-outline-variant rounded text-body-md text-on-surface placeholder:text-on-surface-variant/50 focus:border-secondary focus:ring-1 focus:ring-secondary focus:outline-none transition-colors" id="email" name="email" placeholder="analyst@enterprise.com" required="" type="email">
</div>
</div>
<div class="flex flex-col gap-stack-sm">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface" for="password">Password</label>
<a class="font-label-md text-label-md text-secondary hover:text-primary transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 text-on-surface-variant">
<span class="material-symbols-outlined text-[18px]">key</span>
</span>
<input class="w-full pl-10 pr-10 py-2 bg-surface-container-lowest border border-outline-variant rounded text-body-md text-on-surface focus:border-secondary focus:ring-1 focus:ring-secondary focus:outline-none transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password">
<button class="absolute inset-y-0 right-0 flex items-center pr-3 text-on-surface-variant hover:text-on-surface transition-colors" title="Toggle password visibility" type="button">
<span class="material-symbols-outlined text-[18px]">visibility</span>
</button>
</div>
</div>
<div class="flex items-center gap-2 mt-unit">
<input class="w-4 h-4 text-secondary border-outline-variant rounded focus:ring-secondary focus:ring-1 cursor-pointer bg-surface-container-lowest" id="remember" name="remember" type="checkbox">
<label class="font-body-sm text-body-sm text-on-surface-variant cursor-pointer select-none" for="remember">Remember me</label>
</div>
<button class="mt-stack-sm w-full h-[44px] bg-primary-container hover:bg-primary text-on-primary rounded font-label-md text-label-md flex items-center justify-center gap-2 transition-colors shadow-level-2" type="submit">
                    Login to Platform
                    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
</div>
<footer class="bg-surface-container-low px-stack-lg py-stack-md border-t border-outline-variant text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant flex items-center justify-center gap-1">
<span class="material-symbols-outlined text-[14px]">info</span>
                Unauthorized access is strictly prohibited.
            </p>
</footer>
</main>


</body></html>
