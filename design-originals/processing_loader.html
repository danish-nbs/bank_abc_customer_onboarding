<!DOCTYPE html><html class="h-full" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Processing - KYC Verifier</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;family=JetBrains+Mono:wght@400&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary": "#ffffff",
                        "surface-dim": "#cbdbf5",
                        "tertiary-fixed": "#d9e3f2",
                        "secondary-container": "#90bafd",
                        "tertiary": "#030b15",
                        "surface-container-highest": "#d3e4fe",
                        "tertiary-fixed-dim": "#bdc7d6",
                        "on-primary-container": "#708ab5",
                        "on-background": "#0b1c30",
                        "on-tertiary-fixed": "#131c27",
                        "primary-fixed": "#d6e3ff",
                        "surface-container-high": "#dce9ff",
                        "on-tertiary": "#ffffff",
                        "outline": "#74777f",
                        "secondary-fixed": "#d5e3ff",
                        "error": "#ba1a1a",
                        "surface-tint": "#465f88",
                        "on-primary-fixed-variant": "#2d476f",
                        "error-container": "#ffdad6",
                        "primary-fixed-dim": "#aec7f6",
                        "surface-container-low": "#eff4ff",
                        "on-primary-fixed": "#001b3d",
                        "inverse-surface": "#213145",
                        "primary-container": "#002147",
                        "on-tertiary-fixed-variant": "#3e4853",
                        "on-surface-variant": "#44474e",
                        "tertiary-container": "#18222d",
                        "primary": "#000a1e",
                        "on-tertiary-container": "#7f8997",
                        "on-secondary": "#ffffff",
                        "surface": "#f8f9ff",
                        "outline-variant": "#c4c6cf",
                        "surface-container-lowest": "#ffffff",
                        "on-error": "#ffffff",
                        "inverse-on-surface": "#eaf1ff",
                        "on-surface": "#0b1c30",
                        "background": "#f8f9ff",
                        "surface-bright": "#f8f9ff",
                        "secondary": "#325f9c",
                        "on-secondary-fixed-variant": "#114783",
                        "surface-container": "#e5eeff",
                        "on-secondary-fixed": "#001b3c",
                        "on-error-container": "#93000a",
                        "surface-variant": "#d3e4fe",
                        "secondary-fixed-dim": "#a7c8ff",
                        "on-secondary-container": "#154985",
                        "inverse-primary": "#aec7f6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "container-max": "1440px",
                        "stack-sm": "8px",
                        "margin-mobile": "16px",
                        "unit": "4px",
                        "gutter": "24px",
                        "stack-md": "16px",
                        "stack-lg": "24px",
                        "margin-desktop": "32px"
                    },
                    "fontFamily": {
                        "label-md": ["Inter"],
                        "body-sm": ["Inter"],
                        "body-lg": ["Inter"],
                        "mono-md": ["JetBrains Mono"],
                        "headline-sm": ["Inter"],
                        "display-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "body-sm": ["13px", { "lineHeight": "18px", "fontWeight": "400" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "mono-md": ["13px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "display-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }]
                    }
                },
            },
        }
    </script>
<style>
        .pulse-ring {
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        .spin-slow {
            animation: spin 3s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-background text-on-background h-full font-body-md overflow-hidden flex">
<!-- Suppressing SideNav & TopNav as this is a transactional 'Processing' dead-end state. -->
<main class="flex-1 h-full flex items-center justify-center p-gutter">
<div class="bg-surface border border-outline-variant rounded-lg w-full max-w-2xl p-stack-lg shadow-sm flex flex-col items-center">
<!-- Animation Area -->
<div class="relative w-48 h-48 mb-stack-lg flex items-center justify-center">
<!-- Outer Pulse -->
<div class="absolute inset-0 rounded-full border-2 border-secondary pulse-ring"></div>
<!-- Inner Spinner -->
<div class="absolute inset-4 rounded-full border-4 border-surface-container-high border-t-primary spin-slow"></div>
<!-- Center Icon -->
<div class="bg-surface-container-low rounded-full w-24 h-24 flex items-center justify-center z-10 shadow-sm border border-outline-variant">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="document_scanner">document_scanner</span>
</div>
</div>
<!-- Header -->
<div class="text-center mb-stack-lg">
<h1 class="font-headline-md text-headline-md text-primary mb-stack-sm">Processing Case Data</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Please wait while we verify the submitted documents.</p>
</div>
<!-- Steps List -->
<div class="w-full space-y-unit">
<!-- Step 1: Complete -->
<div class="flex items-center justify-between p-stack-sm bg-surface-container-low border border-outline-variant rounded">
<div class="flex items-center gap-stack-sm">
<span class="material-symbols-outlined text-secondary" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="font-label-md text-label-md text-on-background">Ingesting Files</span>
</div>
<span class="font-mono-md text-mono-md text-secondary">[Complete]</span>
</div>
<!-- Step 2: In Progress -->
<div class="flex items-center justify-between p-stack-sm bg-surface border border-primary ring-1 ring-primary/20 rounded shadow-[0px_4px_12px_rgba(0,33,71,0.05)]">
<div class="flex items-center gap-stack-sm">
<span class="material-symbols-outlined text-primary spin-slow" data-icon="sync">sync</span>
<span class="font-label-md text-label-md text-primary">Classifying Documents</span>
</div>
<span class="font-mono-md text-mono-md text-primary">[In Progress]</span>
</div>
<!-- Step 3: Pending -->
<div class="flex items-center justify-between p-stack-sm bg-surface opacity-50 border border-outline-variant rounded">
<div class="flex items-center gap-stack-sm">
<span class="material-symbols-outlined text-outline" data-icon="hourglass_empty">hourglass_empty</span>
<span class="font-label-md text-label-md text-outline">Extracting Identity Data</span>
</div>
<span class="font-mono-md text-mono-md text-outline">[Pending]</span>
</div>
<!-- Step 4: Pending -->
<div class="flex items-center justify-between p-stack-sm bg-surface opacity-50 border border-outline-variant rounded">
<div class="flex items-center gap-stack-sm">
<span class="material-symbols-outlined text-outline" data-icon="hourglass_empty">hourglass_empty</span>
<span class="font-label-md text-label-md text-outline">Running Fraud Checks</span>
</div>
<span class="font-mono-md text-mono-md text-outline">[Pending]</span>
</div>
</div>
<div class="mt-stack-lg w-full">
<div class="h-1 w-full bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-secondary w-1/3 transition-all duration-500 ease-in-out"></div>
</div>
<p class="text-right font-mono-md text-mono-md text-on-surface-variant mt-unit text-xs">ETA: 45s</p>
</div>
<div class="mt-stack-lg text-center">
<button class="px-stack-md py-stack-sm border border-outline-variant rounded font-label-md text-label-md text-on-surface-variant hover:bg-surface-container-low transition-colors">
                     Cancel Processing
                 </button>
</div>
</div>
</main>
</body></html>
